<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人格类型评估测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e5e5e5;
            overflow-x: hidden;
            cursor: none;
        }

        /* Custom Cursor */
        .cursor-dot,
        .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }

        .cursor-dot {
            width: 5px;
            height: 5px;
            background-color: white;
        }

        .cursor-outline {
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }

        .cursor-outline.hover {
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.1);
            border-color: white;
        }

        /* Particle Background */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        /* Typography */
        .serif {
            font-family: 'Noto Serif SC', serif;
        }

        /* Glitch Effect for Title */
        .glitch {
            position: relative;
            animation: glitch-skew 1s infinite linear alternate-reverse;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(78px, 9999px, 20px, 0); }
            40% { clip: rect(15px, 9999px, 63px, 0); }
            60% { clip: rect(89px, 9999px, 12px, 0); }
            80% { clip: rect(45px, 9999px, 78px, 0); }
            100% { clip: rect(62px, 9999px, 34px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 99px, 0); }
            20% { clip: rect(12px, 9999px, 45px, 0); }
            40% { clip: rect(78px, 9999px, 23px, 0); }
            60% { clip: rect(34px, 9999px, 67px, 0); }
            80% { clip: rect(91px, 9999px, 12px, 0); }
            100% { clip: rect(56px, 9999px, 89px, 0); }
        }

        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            10% { transform: skew(-2deg); }
            20% { transform: skew(2deg); }
            30% { transform: skew(0deg); }
            100% { transform: skew(0deg); }
        }

        /* Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .float-animation {
            animation: float 6s ease-in-out infinite;
        }

        /* Pulse Glow */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.3), 0 0 60px rgba(255, 255, 255, 0.1); }
        }

        .pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        /* Progress Bar with Gradient */
        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1000;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffffff, #888888, #ffffff);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* 3D Card Effect */
        .card-3d {
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-3d:hover {
            transform: rotateY(5deg) rotateX(5deg) translateZ(20px);
        }

        /* Option Cards with Hover Effects */
        .option-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .option-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .option-card:hover::before {
            left: 100%;
        }

        .option-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateX(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .option-card.selected {
            background: rgba(255, 255, 255, 0.15);
            border-color: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* Neon Button */
        .neon-button {
            position: relative;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            overflow: hidden;
            transition: all 0.3s;
        }

        .neon-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .neon-button:hover::before {
            left: 100%;
        }

        .neon-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 0 40px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .neon-button:active {
            transform: translateY(0);
        }

        /* Section Transitions */
        .section-container {
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            filter: blur(10px);
        }

        .section-container.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0);
        }

        /* Question Stagger Animation */
        .question-item {
            opacity: 0;
            transform: translateX(-50px);
            animation: slideIn 0.6s forwards;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Result Card with Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Typing Effect */
        .typing-text {
            overflow: hidden;
            border-right: 2px solid white;
            white-space: nowrap;
            animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: white; }
        }

        /* Magnetic Effect for Buttons */
        .magnetic {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Scanline Effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.3;
        }

        /* Loading Spinner */
        .loader {
            width: 48px;
            height: 48px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Result Type Badge */
        .type-badge {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }

        .type-badge::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        /* Parallax Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -2;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--opacity); transform: scale(1); }
        }

        /* Scroll Indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        /* Noise Texture */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9997;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">

    <!-- Effects Layers -->
    <div class="noise"></div>
    <div class="scanlines"></div>
    <canvas id="particles-canvas"></canvas>
    <div class="stars" id="stars"></div>

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Progress Bar -->
    <div class="progress-container">
        <div id="progressBar" class="progress-bar" style="width: 0%"></div>
    </div>

    <!-- Header -->
    <header class="pt-16 pb-8 px-4 text-center relative z-10">
        <h1 class="serif text-4xl md:text-6xl font-bold text-white mb-4 tracking-tight glitch" data-text="人格类型评估测试">
            人格类型评估测试
        </h1>
        <p class="text-gray-400 text-sm md:text-base tracking-[0.3em] uppercase opacity-80">Personality Assessment</p>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container max-w-3xl mx-auto px-4 pb-20 relative z-10">
        
        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="section-container active text-center py-12">
            <div class="mb-12 float-animation">
                <div class="w-24 h-24 mx-auto mb-8 rounded-full bg-gradient-to-br from-gray-800 to-black border border-gray-700 flex items-center justify-center pulse-glow relative">
                    <div class="absolute inset-0 rounded-full bg-white opacity-10 blur-xl"></div>
                    <svg class="w-10 h-10 text-white relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                    </svg>
                </div>
                <h2 class="serif text-3xl md:text-4xl text-white mb-6 tracking-wide">欢迎开启这场自我探索之旅</h2>
                <p class="text-gray-400 leading-relaxed max-w-lg mx-auto mb-12 text-lg">
                    通过回答以下问题，我们将帮助你更好地了解自己的性格倾向和行为模式。整个测试大约需要 3-5 分钟。
                </p>
            </div>
            
            <button onclick="startTest()" class="magnetic neon-button px-10 py-4 text-lg font-medium rounded-none tracking-widest uppercase relative group">
                <span class="relative z-10">开始测试</span>
                <div class="absolute inset-0 bg-white transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300 opacity-10"></div>
            </button>

            <div class="scroll-indicator text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                </svg>
            </div>
        </div>

        <!-- Test Container -->
        <div id="testContainer" class="section-container">
            <!-- Section Title -->
            <div class="mb-12 text-center">
                <span id="sectionNumber" class="inline-block px-4 py-1 border border-gray-700 rounded-full text-xs font-semibold tracking-widest text-gray-500 uppercase mb-4">第一部分</span>
                <h2 id="sectionTitle" class="serif text-3xl md:text-4xl text-white mb-3">顺从倾向检测</h2>
                <p id="sectionDesc" class="text-gray-500 text-sm tracking-wide">了解你在人际关系中的边界感</p>
            </div>

            <!-- Questions Container -->
            <div id="questionsList" class="space-y-6">
                <!-- Questions will be injected here -->
            </div>

            <!-- Navigation -->
            <div class="mt-16 flex justify-between items-center pt-8 border-t border-gray-800">
                <button id="prevBtn" onclick="previousSection()" class="magnetic text-gray-500 hover:text-white text-sm font-medium transition-all duration-300 flex items-center gap-2 group disabled:opacity-0" disabled>
                    <svg class="w-4 h-4 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    上一部分
                </button>
                
                <div class="flex flex-col items-center">
                    <span id="pageIndicator" class="text-2xl font-light text-white mb-1">01</span>
                    <div class="w-16 h-px bg-gray-700"></div>
                    <span class="text-xs text-gray-600 mt-1">03</span>
                </div>

                <button id="nextBtn" onclick="nextSection()" class="magnetic neon-button px-8 py-3 text-sm font-medium disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2 group">
                    <span id="nextBtnText">下一部分</span>
                    <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="section-container py-8">
            <div class="text-center mb-12">
                <div class="inline-block p-6 rounded-full bg-gradient-to-br from-gray-800 to-black border border-gray-700 mb-6 relative pulse-glow">
                    <div class="absolute inset-0 rounded-full bg-white opacity-5 blur-xl"></div>
                    <svg class="w-8 h-8 text-white relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <h2 class="serif text-4xl text-white mb-3">评估完成</h2>
                <p class="text-gray-400 tracking-wide">基于你的回答，我们为你生成了以下分析</p>
            </div>

            <div class="glass-card rounded-2xl p-8 md:p-12 mb-8 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-white to-transparent opacity-30"></div>
                
                <div class="text-center mb-8">
                    <span class="type-badge inline-block px-6 py-2 rounded-full text-xs font-semibold tracking-widest text-gray-300 uppercase mb-6">
                        你的人格类型
                    </span>
                    <h3 id="resultType" class="serif text-3xl md:text-5xl text-white font-bold mb-4 tracking-tight">平衡型协调者</h3>
                    <div class="w-24 h-px bg-gradient-to-r from-transparent via-gray-500 to-transparent mx-auto"></div>
                </div>
                
                <div class="prose prose-invert max-w-none">
                    <p id="resultDesc" class="text-gray-300 leading-relaxed text-center mb-10 text-lg font-light">
                        你在维护自我边界和照顾他人感受之间找到了良好的平衡点。你既不会过度牺牲自己，也不会显得冷漠疏离。
                    </p>
                    
                    <div class="border-t border-gray-800 pt-8 mt-8">
                        <h4 class="text-sm font-semibold text-white uppercase tracking-[0.2em] mb-6 flex items-center justify-center gap-3">
                            <span class="w-8 h-px bg-gray-600"></span>
                            个性化行动建议
                            <span class="w-8 h-px bg-gray-600"></span>
                        </h4>
                        <ul id="actionItems" class="space-y-4 text-gray-400">
                            <!-- Action items injected here -->
                        </ul>
                    </div>
                </div>
            </div>

            <div class="text-center space-x-6">
                <button onclick="restartTest()" class="magnetic text-gray-400 hover:text-white text-sm font-medium tracking-widest uppercase transition-colors relative group">
                    重新测试
                    <span class="absolute -bottom-1 left-0 w-0 h-px bg-white transition-all group-hover:w-full"></span>
                </button>
                <button onclick="window.print()" class="magnetic text-gray-400 hover:text-white text-sm font-medium tracking-widest uppercase transition-colors relative group">
                    保存结果
                    <span class="absolute -bottom-1 left-0 w-0 h-px bg-white transition-all group-hover:w-full"></span>
                </button>
            </div>
        </div>

    </main>

            {
                id: 3,
                title: "第三部分：决策风格分析",
                description: "了解你的思维模式与决策偏好",
                questions: [
                    {
                        id: "q7",
                        text: "我做决定时更依赖逻辑分析，而非个人感受",
                        options: [
                            { value: 1, label: "完全不符合" },
                            { value: 2, label: "不太符合" },
                            { value: 3, label: "一般" },
                            { value: 4, label: "比较符合" },
                            { value: 5, label: "完全符合" }
                        ]
                    },
                    {
                        id: "q8",
                        text: "我喜欢提前计划，不喜欢临时改变安排",
                        options: [
                            { value: 1, label: "完全不符合" },
                            { value: 2, label: "不太符合" },
                            { value: 3, label: "一般" },
                            { value: 4, label: "比较符合" },
                            { value: 5, label: "完全符合" }
                        ]
                    },
                    {
                        id: "q9",
                        text: "面对不确定性时，我会感到焦虑不安",
                        options: [
                            { value: 1, label: "完全不符合" },
                            { value: 2, label: "不太符合" },
                            { value: 3, label: "一般" },
                            { value: 4, label: "比较符合" },
                            { value: 5, label: "完全符合" }
                        ]
                    }
                ]
            }
        ];

        // State Management
        let currentSection = 0;
        let answers = {};
        let totalQuestions = testData.reduce((acc, section) => acc + section.questions.length, 0);

        // Custom Cursor
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        
        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;
            
            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;
            
            cursorOutline.animate({
                left: `${posX}px`,
                top: `${posY}px`
            }, { duration: 500, fill: "forwards" });
        });

        // Add hover effect to interactive elements
        document.querySelectorAll('button, .option-card').forEach(el => {
            el.addEventListener('mouseenter', () => cursorOutline.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursorOutline.classList.remove('hover'));
        });

        // Particle System
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // Connect nearby particles
            particles.forEach((a, index) => {
                particles.slice(index + 1).forEach(b => {
                    const dx = a.x - b.x;
                    const dy = a.y - b.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 100) {
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 * (1 - distance / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        ctx.stroke();
                    }
                });
            });
            
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // Generate Stars
        function generateStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${3 + Math.random() * 4}s`);
                star.style.setProperty('--delay', `${Math.random() * 5}s`);
                star.style.setProperty('--opacity', `${0.3 + Math.random() * 0.7}`);
                starsContainer.appendChild(star);
            }
        }
        generateStars();

        // Initialize
        function startTest() {
            switchSection('welcomeScreen', 'testContainer');
            renderSection();
            updateProgress();
        }

        function switchSection(hideId, showId) {
            const hideEl = document.getElementById(hideId);
            const showEl = document.getElementById(showId);
            
            hideEl.classList.remove('active');
            
            setTimeout(() => {
                hideEl.style.display = 'none';
                showEl.style.display = 'block';
                setTimeout(() => showEl.classList.add('active'), 50);
            }, 600);
        }

        function renderSection() {
            const section = testData[currentSection];
            
            // Update headers with animation
            document.getElementById('sectionNumber').textContent = `第${['一', '二', '三'][currentSection]}部分`;
            document.getElementById('sectionTitle').textContent = section.title.split('：')[1] || section.title;
            document.getElementById('sectionDesc').textContent = section.description;
            document.getElementById('pageIndicator').textContent = `0${currentSection + 1}`;
            
            // Render questions with stagger animation
            const container = document.getElementById('questionsList');
            container.innerHTML = '';
            
            section.questions.forEach((q, index) => {
                const questionEl = document.createElement('div');
                questionEl.className = 'question-item card-3d';
                questionEl.style.animationDelay = `${index * 0.15}s`;
                
                let optionsHtml = '';
                q.options.forEach(opt => {
                    const isSelected = answers[q.id] === opt.value;
                    optionsHtml += `
                        <div onclick="selectOption('${q.id}', ${opt.value})" 
                             class="option-card cursor-pointer rounded-lg mb-3 py-4 px-6 flex items-center justify-between ${isSelected ? 'selected' : 'text-gray-400'}">
                            <span class="text-sm tracking-wide">${opt.label}</span>
                            ${isSelected ? '<svg class="w-5 h-5 animate-pulse" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>' : '<div class="w-4 h-4 rounded-full border border-gray-600"></div>'}
                        </div>
                    `;
                });
                
                questionEl.innerHTML = `
                    <div class="bg-gray-900/50 backdrop-blur-sm border border-gray-800 rounded-xl p-6 mb-4 hover:border-gray-700 transition-colors">
                        <h3 class="text-lg font-medium text-white mb-6 flex items-start leading-relaxed">
                            <span class="text-gray-600 mr-4 font-serif text-2xl italic font-light">0${index + 1}</span>
                            <span>${q.text}</span>
                        </h3>
                        <div class="space-y-2">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
                
                container.appendChild(questionEl);
            });
            
            // Update navigation
            document.getElementById('prevBtn').disabled = currentSection === 0;
            document.getElementById('prevBtn').style.opacity = currentSection === 0 ? '0' : '1';
            
            const allAnswered = section.questions.every(q => answers[q.id] !== undefined);
            document.getElementById('nextBtnText').textContent = currentSection === testData.length - 1 ? '查看结果' : '下一部分';
            document.getElementById('nextBtn').disabled = !allAnswered;
            
            if (allAnswered) {
                document.getElementById('nextBtn').classList.add('pulse-glow');
            }
        }

        function selectOption(questionId, value) {
            answers[questionId] = value;
            
            // Add ripple effect
            event.currentTarget.style.transform = 'scale(0.98)';
            setTimeout(() => {
                event.currentTarget.style.transform = '';
            }, 100);
            
            renderSection();
            updateProgress();
        }

        function updateProgress() {
            const answeredCount = Object.keys(answers).length;
            const progress = (answeredCount / totalQuestions) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }

        function nextSection() {
            if (currentSection < testData.length - 1) {
                currentSection++;
                
                // Fade out current questions
                const container = document.getElementById('questionsList');
                container.style.opacity = '0';
                container.style.transform = 'translateX(-20px)';
                
                setTimeout(() => {
                    renderSection();
                    container.style.opacity = '1';
                    container.style.transform = 'translateX(0)';
                }, 300);
            } else {
                showResults();
            }
        }

        function previousSection() {
            if (currentSection > 0) {
                currentSection--;
                
                const container = document.getElementById('questionsList');
                container.style.opacity = '0';
                container.style.transform = 'translateX(20px)';
                
                setTimeout(() => {
                    renderSection();
                    container.style.opacity = '1';
                    container.style.transform = 'translateX(0)';
                }, 300);
            }
        }

        function calculateResults() {
            let compliance = 0;
            let social = 0;
            let decision = 0;
            
            testData[0].questions.forEach(q => compliance += answers[q.id] || 0);
            testData[1].questions.forEach(q => social += answers[q.id] || 0);
            testData[2].questions.forEach(q => decision += answers[q.id] || 0);
            
            let type = "";
            let desc = "";
            let actions = [];
            
            if (compliance >= 10) {
                type = "高敏感照顾者";
                desc = "你拥有极强的共情能力和利他倾向，总是把他人的需求放在首位。这种特质让你成为朋友眼中的温暖港湾，但也容易让你忽视自己的边界。";
                actions = [
                    "练习说'不'：从小事开始，逐步建立拒绝的能力",
                    "设立'自我时间'：每天留出30分钟完全属于自己的时间",
                    "区分'帮助'与'拯救'：你可以支持他人，但不必为他人的情绪负责"
                ];
            } else if (social >= 10 && decision >= 10) {
                type = "独立分析者";
                desc = "你重视逻辑和独处时光，拥有清晰的思维边界。你善于独立思考，但在亲密关系中可能需要更多练习表达情感。";
                actions = [
                    "尝试每周一次深度社交：选择一位信任的朋友进行有意义的对话",
                    "允许不完美：练习在信息不全时做出决定",
                    "情感日记：每天记录一个情绪感受，增强情绪觉察力"
                ];
            } else if (compliance <= 6 && social <= 6) {
                type = "自主开拓者";
                desc = "你拥有强烈的自我意识和独立性，不容易被外界评价左右。你清楚自己想要什么，但偶尔可能显得过于直接。";
                actions = [
                    "主动倾听：在对话中多询问对方的感受，而非仅关注解决方案",
                    "柔软表达：尝试用'我观察到...'代替'你应该...'",
                    "定期反思：每月回顾一次人际关系，看看是否有被忽视的维护需求"
                ];
            } else {
                type = "平衡型协调者";
                desc = "你在维护自我边界和照顾他人感受之间找到了良好的平衡点。你既不会过度牺牲自己，也不会显得冷漠疏离。";
                actions = [
                    "保持觉察：定期进行自我检查，确保这种平衡没有被打破",
                    "深化关系：在保持边界的同时，尝试对少数人展示更多脆弱面",
                    "灵活调整：根据不同情境微调你的互动模式，保持适应性"
                ];
            }
            
            return { type, desc, actions };
        }

        function showResults() {
            const results = calculateResults();
            
            switchSection('testContainer', 'resultsScreen');
            
            // Animate result text
            setTimeout(() => {
                document.getElementById('resultType').textContent = results.type;
                document.getElementById('resultDesc').textContent = results.desc;
                
                const actionsList = document.getElementById('actionItems');
                actionsList.innerHTML = results.actions.map((action, index) => `
                    <li class="flex items-start p-4 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition-colors" style="animation: slideIn 0.5s forwards ${index * 0.2}s; opacity: 0; transform: translateX(-20px);">
                        <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-white/10 text-xs text-white mr-4 flex-shrink-0 border border-white/20">${index + 1}</span>
                        <span class="text-gray-300 leading-relaxed">${action}</span>
                    </li>
                `).join('');
            }, 300);
            
            document.getElementById('progressBar').style.width = '100%';
        }

        function restartTest() {
            currentSection = 0;
            answers = {};
            document.getElementById('progressBar').style.width = '0%';
            switchSection('resultsScreen', 'welcomeScreen');
        }

        // Magnetic button effect
        document.querySelectorAll('.magnetic').forEach(button => {
            button.addEventListener('mousemove', (e) => {
                const rect = button.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                
                button.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px)`;
            });
            
            button.addEventListener('mouseleave', () => {
                button.style.transform = 'translate(0, 0)';
            });
        });

        // Parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth - e.pageX) / 50;
            const y = (window.innerHeight - e.pageY) / 50;
            
            document.querySelectorAll('.card-3d').forEach(card => {
                card.style.transform = `translateX(${x}px) translateY(${y}px)`;
            });
        });
    </script>
</body>
