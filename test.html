<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人格类型评估测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e5e5e5;
            overflow-x: hidden;
        }
        .serif { font-family: 'Noto Serif SC', serif; }
        
        /* Progress Bar */
        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffffff, #888888);
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .float { animation: float 3s ease-in-out infinite; }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.3); }
        }
        .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }

        /* Glass Card */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Option Cards */
        .option-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .option-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateX(5px);
        }
        .option-card.selected {
            background: rgba(255, 255, 255, 0.15);
            border-color: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Neon Button */
        .neon-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .neon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .neon-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Background Animation */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            pointer-events: none;
        }

        .hidden { display: none !important; }
        .section { opacity: 0; pointer-events: none; position: absolute; width: 100%; transition: opacity 0.5s; }
        .section.active { opacity: 1; pointer-events: all; position: relative; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="bg-grid"></div>

    <!-- Progress Bar -->
    <div class="progress-container">
        <div id="progressBar" class="progress-bar" style="width: 0%"></div>
    </div>

    <!-- Header -->
    <header class="pt-12 pb-6 px-4 text-center">
        <h1 class="serif text-3xl md:text-5xl font-bold text-white mb-2 tracking-tight">人格类型评估测试</h1>
        <p class="text-gray-500 text-sm tracking-widest uppercase">Personality Assessment</p>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container max-w-2xl mx-auto px-4 pb-12">

        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="section active text-center py-12">
            <div class="mb-10 float">
                <div class="w-20 h-20 mx-auto mb-6 rounded-full glass flex items-center justify-center pulse-glow">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                    </svg>
                </div>
                <h2 class="serif text-2xl text-white mb-4">欢迎开启这场自我探索之旅</h2>
                <p class="text-gray-400 leading-relaxed max-w-md mx-auto mb-8">
                    通过回答以下问题，我们将帮助你更好地了解自己的性格倾向和行为模式。
                </p>
            </div>
            <button onclick="startTest()" class="neon-btn px-8 py-3 text-base font-medium rounded">
                开始测试
            </button>
        </div>

        <!-- Test Container -->
        <div id="testContainer" class="section py-4">
            <div class="mb-8 text-center">
                <span id="sectionNumber" class="text-xs font-semibold tracking-widest text-gray-500 uppercase mb-2 block">第一部分</span>
                <h2 id="sectionTitle" class="serif text-2xl text-white">顺从倾向检测</h2>
                <p id="sectionDesc" class="text-gray-500 text-sm mt-1">了解你在人际关系中的边界感</p>
            </div>

            <div id="questionsList" class="space-y-4"></div>

            <div class="mt-10 flex justify-between items-center pt-6 border-t border-gray-800">
                <button id="prevBtn" onclick="previousSection()" class="text-gray-500 hover:text-white text-sm transition-colors disabled:opacity-0" disabled>
                    ← 上一部分
                </button>
                <span id="pageIndicator" class="text-sm text-gray-600">1 / 3</span>
                <button id="nextBtn" onclick="nextSection()" class="neon-btn px-6 py-2 text-sm rounded disabled:opacity-30">
                    下一部分
                </button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="section py-8">
            <div class="text-center mb-8">
                <div class="inline-block p-4 rounded-full glass mb-4 pulse-glow">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <h2 class="serif text-3xl text-white mb-2">评估完成</h2>
                <p class="text-gray-400 text-sm">基于你的回答，我们为你生成了以下分析</p>
            </div>

            <div class="glass rounded-xl p-6 md:p-8 mb-6">
                <div class="text-center mb-6">
                    <span class="inline-block px-4 py-1 rounded-full text-xs font-semibold tracking-widest text-gray-400 uppercase border border-gray-700 mb-3">
                        你的人格类型
                    </span>
                    <h3 id="resultType" class="serif text-2xl md:text-3xl text-white font-bold">平衡型协调者</h3>
                </div>
                
                <p id="resultDesc" class="text-gray-300 leading-relaxed text-center mb-6 text-sm">
                    你在维护自我边界和照顾他人感受之间找到了良好的平衡点。
                </p>
                
                <div class="border-t border-gray-800 pt-6">
                    <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4 text-center">个性化行动建议</h4>
                    <ul id="actionItems" class="space-y-3 text-sm text-gray-400"></ul>
                </div>
            </div>

            <div class="text-center space-x-4">
                <button onclick="restartTest()" class="text-gray-500 hover:text-white text-sm underline underline-offset-4">
                    重新测试
                </button>
            </div>
        </div>

    </main>

    <script>
        const testData = [
            {
                id: 1,
                title: "第一部分：顺从倾向检测",
                description: "了解你在人际关系中的边界感",
                questions: [
                    { id: "q1", text: "我很难拒绝别人的请求，即使我自己很忙" },
                    { id: "q2", text: "我倾向于避免冲突，即使这意味着我要妥协自己的需求" },
                    { id: "q3", text: "当别人对我失望时，我会感到强烈的内疚感" }
                ]
            },
            {
                id: 2,
                title: "第二部分：社交能量评估",
                description: "探索你的能量来源与社交偏好",
                questions: [
                    { id: "q4", text: "长时间的社交活动会让我感到精疲力竭" },
                    { id: "q5", text: "我更喜欢深入的对话，而不是表面的闲聊" },
                    { id: "q6", text: "在群体中，我通常是倾听者而非发言者" }
                ]
            },
            {
                id: 3,
                title: "第三部分：决策风格分析",
                description: "了解你的思维模式与决策偏好",
                questions: [
                    { id: "q7", text: "我做决定时更依赖逻辑分析，而非个人感受" },
                    { id: "q8", text: "我喜欢提前计划，不喜欢临时改变安排" },
                    { id: "q9", text: "面对不确定性时，我会感到焦虑不安" }
                ]
            }
        ];

        const options = [
            { value: 1, label: "完全不符合" },
            { value: 2, label: "不太符合" },
            { value: 3, label: "一般" },
            { value: 4, label: "比较符合" },
            { value: 5, label: "完全符合" }
        ];

        let currentSection = 0;
        let answers = {};
        const totalQuestions = 9;

        function startTest() {
            switchSection('welcomeScreen', 'testContainer');
            renderSection();
        }

        function switchSection(hideId, showId) {
            document.getElementById(hideId).classList.remove('active');
            setTimeout(() => {
                document.getElementById(hideId).classList.add('hidden');
                document.getElementById(showId).classList.remove('hidden');
                setTimeout(() => document.getElementById(showId).classList.add('active'), 50);
            }, 500);
        }

        function renderSection() {
            const section = testData[currentSection];
            document.getElementById('sectionNumber').textContent = `第${['一','二','三'][currentSection]}部分`;
            document.getElementById('sectionTitle').textContent = section.title.split('：')[1];
            document.getElementById('sectionDesc').textContent = section.description;
            document.getElementById('pageIndicator').textContent = `${currentSection + 1} / 3`;

            const container = document.getElementById('questionsList');
            container.innerHTML = '';

            section.questions.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = 'glass rounded-lg p-5 fade-in';
                div.style.animationDelay = `${idx * 0.1}s`;
                
                let opts = '';
                options.forEach(opt => {
                    const selected = answers[q.id] === opt.value;
                    opts += `
                        <div onclick="selectOption('${q.id}', ${opt.value})" 
                             class="option-card rounded py-3 px-4 mb-2 flex justify-between items-center ${selected ? 'selected' : ''}">
                            <span class="text-sm ${selected ? 'text-white' : 'text-gray-400'}">${opt.label}</span>
                            ${selected ? '✓' : '<div class="w-4 h-4 rounded-full border border-gray-600"></div>'}
                        </div>
                    `;
                });

                div.innerHTML = `
                    <h3 class="text-white mb-4 text-sm md:text-base"><span class="text-gray-600 mr-2">${idx + 1}.</span>${q.text}</h3>
                    <div>${opts}</div>
                `;
                container.appendChild(div);
            });

            document.getElementById('prevBtn').disabled = currentSection === 0;
            document.getElementById('prevBtn').style.opacity = currentSection === 0 ? '0' : '1';
            
            const allAnswered = section.questions.every(q => answers[q.id] !== undefined);
            document.getElementById('nextBtn').textContent = currentSection === 2 ? '查看结果' : '下一部分';
            document.getElementById('nextBtn').disabled = !allAnswered;
        }

        function selectOption(qid, val) {
            answers[qid] = val;
            updateProgress();
            renderSection();
        }

        function updateProgress() {
            const answered = Object.keys(answers).length;
            document.getElementById('progressBar').style.width = `${(answered / totalQuestions) * 100}%`;
        }

        function nextSection() {
            if (currentSection < 2) {
                currentSection++;
                renderSection();
            } else {
                showResults();
            }
        }

        function previousSection() {
            if (currentSection > 0) {
                currentSection--;
                renderSection();
            }
        }

        function showResults() {
            const section = testData[0];
            let compliance = 0, social = 0, decision = 0;
            
            section.questions.forEach(q => compliance += answers[q.id] || 0);
            testData[1].questions.forEach(q => social += answers[q.id] || 0);
            testData[2].questions.forEach(q => decision += answers[q.id] || 0);

            let type, desc, actions;

            if (compliance >= 10) {
                type = "高敏感照顾者";
                desc = "你拥有极强的共情能力和利他倾向，总是把他人的需求放在首位。这种特质让你成为朋友眼中的温暖港湾，但也容易让你忽视自己的边界。";
                actions = ["练习说'不'：从小事开始，逐步建立拒绝的能力", "设立'自我时间'：每天留出30分钟完全属于自己的时间", "区分'帮助'与'拯救'：你可以支持他人，但不必为他人的情绪负责"];
            } else if (social >= 10 && decision >= 10) {
                type = "独立分析者";
                desc = "你重视逻辑和独处时光，拥有清晰的思维边界。你善于独立思考，但在亲密关系中可能需要更多练习表达情感。";
                actions = ["尝试每周一次深度社交：选择一位信任的朋友进行有意义的对话", "允许不完美：练习在信息不全时做出决定", "情感日记：每天记录一个情绪感受，增强情绪觉察力"];
            } else if (compliance <= 6 && social <= 6) {
                type = "自主开拓者";
                desc = "你拥有强烈的自我意识和独立性，不容易被外界评价左右。你清楚自己想要什么，但偶尔可能显得过于直接。";
                actions = ["主动倾听：在对话中多询问对方的感受，而非仅关注解决方案", "柔软表达：尝试用'我观察到...'代替'你应该...'", "定期反思：每月回顾一次人际关系，看看是否有被忽视的维护需求"];
            } else {
                type = "平衡型协调者";
                desc = "你在维护自我边界和照顾他人感受之间找到了良好的平衡点。你既不会过度牺牲自己，也不会显得冷漠疏离。";
                actions = ["保持觉察：定期进行自我检查，确保这种平衡没有被打破", "深化关系：在保持边界的同时，尝试对少数人展示更多脆弱面", "灵活调整：根据不同情境微调你的互动模式，保持适应性"];
            }

            document.getElementById('resultType').textContent = type;
            document.getElementById('resultDesc').textContent = desc;
            document.getElementById('actionItems').innerHTML = actions.map(a => 
                `<li class="flex items-start"><span class="mr-2 text-gray-600">•</span><span>${a}</span></li>`
            ).join('');

            switchSection('testContainer', 'resultsScreen');
            document.getElementById('progressBar').style.width = '100%';
        }

        function restartTest() {
            currentSection = 0;
            answers = {};
            document.getElementById('progressBar').style.width = '0%';
            switchSection('resultsScreen', 'welcomeScreen');
        }
    </script>
</body>
</html>
